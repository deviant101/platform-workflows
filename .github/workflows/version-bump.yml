name: Version Bump
# Repoints one tenant/app at a new release tag = rewrites one line in its
# values file. Rollback later is a git revert of that commit.
#
# Where it writes (requirements Decision 13): the tenant values live in the
# k8s-gitops repo (Repo 2), NOT here. So this workflow checks out k8s-gitops
# and pushes there — a DIFFERENT repo from the one hosting this workflow, so it
# always needs a token with write access to k8s-gitops: GITOPS_TOKEN (a PAT /
# GitHub App token — see SETUP.md). The run's built-in GITHUB_TOKEN can't reach
# k8s-gitops.
#
# Finding the file: a tenant lives in exactly one region + cluster (Decisions
# 14/18) and each app appears once, so tenant+app uniquely identifies the file
# under tenants/<region>/<cluster>/<tenant>/<app>/ — no need to pass region or
# cluster.
#
# Push model (requirements Decision 15): commits and pushes DIRECTLY to master —
# no PR/review gate yet. The PR-based, CODEOWNERS-gated flow is deferred.
#
# Two ways to run:
#   • workflow_dispatch — run it straight from THIS repo's Actions tab.
#   • workflow_call     — called by an app repo (tenant-app / tenant-api) so the
#                         app team can trigger it from their own repo, if that
#                         repo adds a thin caller workflow.
on:
  workflow_dispatch:
    inputs:
      app:     { description: "App instance, e.g. tenant-app / tenant-api", required: true, type: string }
      tenant:  { description: "Tenant code, e.g. uco",    required: true, type: string }
      version: { description: "Release tag, e.g. v0.1.1", required: true, type: string }
  workflow_call:
    inputs:
      app:     { required: true, type: string }
      tenant:  { required: true, type: string }
      version: { required: true, type: string }

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      # Check out k8s-gitops (Repo 2) — where the tenant values live. Needs
      # GITOPS_TOKEN because it's a different repo from this one. checkout
      # keeps the token as the push credential (persist-credentials default).
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/k8s-gitops
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Update the pinned version
        env:
          TENANT:  ${{ inputs.tenant }}
          APP:     ${{ inputs.app }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          # tenant+app is unique across regions/clusters → exactly one file.
          matches=(tenants/*/*/"$TENANT"/"$APP"/values.yaml)
          if [ ${#matches[@]} -eq 0 ]; then
            echo "::error::no values file for $TENANT/$APP — onboard the tenant first"; exit 1
          fi
          if [ ${#matches[@]} -gt 1 ]; then
            echo "::error::ambiguous — $TENANT/$APP matched multiple files:"; printf '%s\n' "${matches[@]}"; exit 1
          fi
          file="${matches[0]}"

          sed -i "s|^version:.*|version: $VERSION|" "$file"
          echo "Set $file -> $VERSION"
          grep '^version:' "$file"

          # hand the resolved file path to the commit step
          echo "FILE=$file" >> "$GITHUB_ENV"

      - name: Commit and push directly (no PR — Decision 15)
        env:
          TENANT:  ${{ inputs.tenant }}
          APP:     ${{ inputs.app }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "bump: $TENANT/$APP -> $VERSION"
          git push origin HEAD:master
          echo "Pushed to k8s-gitops. The region's ArgoCD checks out $APP at $VERSION and syncs."
