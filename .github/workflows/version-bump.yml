name: Version Bump
# Repoints one tenant/app at a new release tag = rewrites one line in its
# values file. Rollback later is a git revert of that commit.
#
# Where it writes (requirements Decision 13): the tenant values live in the
# k8s-gitops repo (Repo 2), NOT here. So this workflow checks out k8s-gitops
# and pushes there. That is a DIFFERENT repo from the one hosting this
# workflow, so it always needs a token with write access to k8s-gitops:
# GITOPS_TOKEN (a PAT / GitHub App token — see SETUP.md). The run's built-in
# GITHUB_TOKEN can't reach k8s-gitops.
#
# Push model (requirements Decision 15): it commits and pushes DIRECTLY to
# master — no PR/review gate yet. The PR-based, CODEOWNERS-gated flow is
# deferred and gets layered in later.
#
# Two ways to run:
#   • workflow_dispatch — run it straight from THIS repo's Actions tab.
#   • workflow_call     — called by an app repo (tenant-app / tenant-api) so the
#                         app team can trigger it from their own repo, if that
#                         repo adds a thin caller workflow.
on:
  workflow_dispatch:
    inputs:
      app:     { description: "App instance, e.g. tenant-app / tenant-api", required: true, type: string }
      tenant:  { description: "Tenant code, e.g. uco",    required: true, type: string }
      cluster: { description: "Cluster, e.g. cluster-a",  required: true, type: string }
      version: { description: "Release tag, e.g. v1.1.0", required: true, type: string }
  workflow_call:
    inputs:
      app:     { required: true, type: string }
      tenant:  { required: true, type: string }
      cluster: { required: true, type: string }
      version: { required: true, type: string }

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      # Check out k8s-gitops (Repo 2) — where the tenant values live. Needs
      # GITOPS_TOKEN because it's a different repo from this one. checkout
      # keeps the token as the push credential (persist-credentials default).
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/k8s-gitops
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Update the pinned version
        env:
          CLUSTER: ${{ inputs.cluster }}
          TENANT:  ${{ inputs.tenant }}
          APP:     ${{ inputs.app }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          file="tenants/$CLUSTER/$TENANT/$APP/values.yaml"
          test -f "$file" || { echo "::error::$file not found in k8s-gitops — onboard the tenant first"; exit 1; }
          sed -i "s|^version:.*|version: $VERSION|" "$file"
          echo "Set $file -> $VERSION"
          grep '^version:' "$file"

      - name: Commit and push directly (no PR — Decision 15)
        env:
          CLUSTER: ${{ inputs.cluster }}
          TENANT:  ${{ inputs.tenant }}
          APP:     ${{ inputs.app }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "tenants/$CLUSTER/$TENANT/$APP/values.yaml"
          git commit -m "bump: $TENANT/$APP on $CLUSTER -> $VERSION"
          git push origin HEAD:master
          echo "Pushed to k8s-gitops. ArgoCD checks out app-$APP at $VERSION and syncs."
