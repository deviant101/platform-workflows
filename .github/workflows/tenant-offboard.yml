name: Tenant Offboard

# Where it writes (Decision 13): tenant values live in k8s-gitops, so this
# checks out k8s-gitops using GITOPS_TOKEN (see SETUP.md).
# Push model (Decision 15): commits and pushes DIRECTLY to master — no PR yet.
# On sync, ArgoCD's prune + self-heal reclaim the live resources.
on:
  workflow_dispatch:
    inputs:
      tenant: { description: "Tenant code to offboard, e.g. uco", required: true, type: string }

jobs:
  offboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/k8s-gitops
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Remove the tenant's directory
        env:
          TENANT: ${{ inputs.tenant }}
        run: |
          set -euo pipefail

          # A tenant lives in exactly ONE region + ONE cluster (many tenants may
          # share a cluster — many-to-one), so its dir at
          # tenants/<region>/<cluster>/<tenant> is unique → exactly one match.
          matches=$(find tenants -mindepth 3 -maxdepth 3 -type d -name "$TENANT")
          count=$(printf '%s\n' "$matches" | grep -c . || true)

          if [ "$count" -eq 0 ]; then
            echo "::error::no directory for tenant '$TENANT' — nothing to offboard"; exit 1
          fi
          if [ "$count" -gt 1 ]; then
            echo "::error::tenant '$TENANT' found in >1 region/cluster — expected exactly one (Decisions 14/18):"
            printf '%s\n' "$matches"; exit 1
          fi

          dir="$matches"                    # tenants/<region>/<cluster>/<tenant>
          cluster_dir=$(dirname "$dir")     # tenants/<region>/<cluster>
          region_dir=$(dirname "$cluster_dir")  # tenants/<region>
          rm -rf "$dir"
          echo "removed $dir"

          # Drop the now-empty cluster folder, then the region folder, ONLY if
          # each has nothing else left. rmdir fails on a non-empty dir, and the
          # `|| true` just moves on — sibling tenants/clusters are untouched.
          rmdir "$cluster_dir" 2>/dev/null && echo "removed empty $cluster_dir" || true
          rmdir "$region_dir"  2>/dev/null && echo "removed empty $region_dir"  || true

      - name: Commit and push directly (no PR — Decision 15)
        env:
          TENANT: ${{ inputs.tenant }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A tenants/
          git commit -m "offboard: remove tenant $TENANT"
          git push origin HEAD:master
          echo "Pushed to k8s-gitops. ArgoCD prunes the tenant's Applications."
